<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargas TV</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070c18; color: #e2e8f0; font-family: Arial, sans-serif; }
#header { background: #0b1022; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e2a3a; }
#clock { font-size: 28px; font-family: monospace; color: #38bdf8; }
#day-nav { display: flex; gap: 4px; padding: 8px 24px; background: #0b1022; overflow-x: auto; border-bottom: 1px solid #1e2a3a; }
.day-btn { padding: 6px 14px; background: transparent; border: none; color: #4a6080; cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; white-space: nowrap; }
.day-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; padding: 16px 24px; }
.card { background: #0f1628; border: 1px solid #1e2a3a; border-radius: 8px; padding: 12px; }
.card-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.client { font-size: 14px; font-weight: bold; color: #c8d8ee; }
.qty { background: #0e2a3a; color: #38bdf8; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
.permiso { font-size: 10px; color: #2a4060; margin-bottom: 6px; font-family: monospace; }
.tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.tag-dest { background: #0a2a0a; color: #4ade80; border: 1px solid #1a4a1a; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
.tag-ref { background: #2a1a0a; color: #fb923c; border: 1px solid #4a3a1a; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
.card-foot { display: flex; justify-content: space-between; font-size: 10px; color: #2a4060; padding-top: 6px; border-top: 1px solid #1e2a3a; }
.hab { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
.hab.si { background: #0a2a0a; color: #4ade80; }
.hab.no { background: #1a2a3a; color: #2a4060; }
#ticker { background: #0b1022; border-top: 1px solid #1e2a3a; padding: 8px 0; overflow: hidden; white-space: nowrap; position: fixed; bottom: 0; width: 100%; }
#ticker-inner { display: inline-block; animation: scroll 40s linear infinite; }
#ticker-inner span { margin-right: 40px; font-size: 12px; color: #4a6080; }
#ticker-inner strong { color: #38bdf8; }
@keyframes scroll { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
#progress { height: 3px; background: #1e2a3a; }
#progress-fill { height: 100%; background: #38bdf8; width: 100%; transition: width 60s linear; }
.msg { color: #2a4060; padding: 40px; text-align: center; font-size: 14px; }
#stats { display: flex; gap: 20px; }
.stat { display: flex; flex-direction: column; align-items: flex-end; }
.stat .lbl { font-size: 9px; color: #2a4060; text-transform: uppercase; letter-spacing: .12em; }
.stat .val { font-size: 18px; font-family: monospace; font-weight: bold; }
.blue { color: #38bdf8; } .green { color: #4ade80; } .amber { color: #fb923c; }
</style>
</head>
<body>
<div id="progress"><div id="progress-fill"></div></div>
<div id="header">
  <div>
    <div style="font-size:10px;color:#2a4060;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px">Serviexport — Planilla de Cargas</div>
    <div id="day-label" style="font-size:22px;font-weight:bold;color:#e2e8f0">Cargando...</div>
  </div>
  <div id="stats">
    <div class="stat"><span class="lbl">Cargas</span><span class="val blue" id="s-c">—</span></div>
    <div style="width:1px;height:36px;background:#1e2a3a"></div>
    <div class="stat"><span class="lbl">Cont.</span><span class="val green" id="s-t">—</span></div>
    <div style="width:1px;height:36px;background:#1e2a3a"></div>
    <div class="stat"><span class="lbl">Hab.</span><span class="val amber" id="s-h">—</span></div>
    <div style="width:1px;height:36px;background:#1e2a3a"></div>
    <div style="text-align:right">
      <div id="clock" style="font-size:26px;font-family:monospace;color:#38bdf8">--:--:--</div>
      <div id="status" style="font-size:10px;color:#2a4060">conectando...</div>
    </div>
  </div>
</div>
<div id="day-nav"></div>
<div id="grid" style="padding-bottom:50px"><div class="msg">Leyendo planilla...</div></div>
<div id="ticker"><div id="ticker-inner"></div></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfAADdBXh-yTEGESCj4kOvW3tAN2MJ5mx4SvMmuhG6IcnQHmWj7Lzkz7r82ozHU0yx/exec';

let days = {}, currentDay = null, autoIdx = 0, autoTimer = null;

setInterval(() => {
  const n = new Date(), p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
}, 1000);

function toISO(raw) {
  if(!raw) return null;
  const s = String(raw).trim().toLowerCase();
  const mo = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  let m;
  m = s.match(/\w+,?\s+(\d+)\s+de\s+(\w+)/); if(m&&mo[m[2]]) return `2026-${String(mo[m[2]]).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = s.match(/(\d+)\/(\d+)\/(\d+)/); if(m) return `${m[3].length===4?m[3]:'20'+m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = s.match(/(\w+)\s+(\d+)\s+de\s+(\w+)/); if(m&&mo[m[3]]) return `2026-${String(mo[m[3]]).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return null;
}

function friendly(iso) {
  if(!iso) return '';
  const [y,m,d] = iso.split('-'), dt = new Date(+y,+m-1,+d);
  const wd=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const mn=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${wd[dt.getDay()]} ${+d} de ${mn[+m-1]}`;
}

function today() {
  const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function render() {
  const items = days[currentDay]||[];
  document.getElementById('day-label').textContent = friendly(currentDay)||'—';
  document.getElementById('s-c').textContent = items.length||'0';
  document.getElementById('s-t').textContent = items.reduce((s,x)=>s+x.qty,0)||'0';
  document.getElementById('s-h').textContent = items.filter(x=>x.hab&&x.hab.toUpperCase().includes('SI')).length||'0';

  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  Object.keys(days).sort().forEach(iso => {
    const b = document.createElement('button');
    b.className = 'day-btn'+(iso===currentDay?' active':'');
    b.textContent = friendly(iso);
    b.onclick = () => { currentDay=iso; render(); resetAuto(); };
    nav.appendChild(b);
  });

  const grid = document.getElementById('grid');
  if(!items.length){ grid.innerHTML='<div class="msg">Sin cargas</div>'; return; }
  grid.innerHTML = '';
  items.forEach(x => {
    const hab = x.hab&&x.hab.toUpperCase().includes('SI');
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `
      <div class="card-top"><span class="client">${x.client}</span><span class="qty">${x.qty} cnt</span></div>
      <div class="permiso">${x.permiso||'—'}</div>
      <div class="tags">
        ${x.dest?`<span class="tag-dest">${x.dest}</span>`:''}
        ${x.ref?`<span class="tag-ref">${x.ref}</span>`:''}
      </div>
      <div class="card-foot">
        <span>${x.guarda?'👤 '+x.guarda:''}</span>
        <span class="hab ${hab?'si':'no'}">${hab?'HAB':'—'}</span>
      </div>`;
    grid.appendChild(d);
  });

  const totals = {};
  items.forEach(x => totals[x.client]=(totals[x.client]||0)+x.qty);
  const html = Object.entries(totals).map(([c,q])=>`<span><strong>${c}</strong> ${q} cnt</span>`).join('');
  document.getElementById('ticker-inner').innerHTML = html+html;
}

function resetAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    const sorted = Object.keys(days).sort();
    autoIdx = (autoIdx+1)%sorted.length;
    currentDay = sorted[autoIdx];
    render();
  }, 20000);
}

function startProgress() {
  const f = document.getElementById('progress-fill');
  f.style.transition='none'; f.style.width='100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ f.style.transition='width 60s linear'; f.style.width='0%'; }));
}

async function load() {
  try {
    const res = await fetch(SCRIPT_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows = await res.json();
    const parsed = {};
    for(let i=1;i<rows.length;i++){
      const r=rows[i]; if(!r||r.length<7) continue;
      const g = j => String(r[j]||'').trim();
      const hab=g(0), guarda=g(1), date=g(4), permiso=g(5), client=g(6);
      const qty=parseInt(g(7))||1, ref=g(8), dest=g(9);
      if(!client||!date) continue;
      const iso=toISO(date); if(!iso) continue;
      if(!parsed[iso]) parsed[iso]=[];
      parsed[iso].push({hab,guarda,permiso,client,qty,ref,dest});
    }
    if(!Object.keys(parsed).length) throw new Error('Sin datos');
    const first = !Object.keys(days).length;
    days = parsed;
    if(first){
      const sorted=Object.keys(days).sort(), t=today();
      currentDay=days[t]?t:sorted[sorted.length-1];
      autoIdx=sorted.indexOf(currentDay);
      resetAuto();
    }
    render();
    startProgress();
    const n=new Date(),p=x=>String(x).padStart(2,'0');
    document.getElementById('status').textContent='● act. '+p(n.getHours())+':'+p(n.getMinutes());
    document.getElementById('grid').style.color='';
  } catch(e) {
    document.getElementById('grid').innerHTML='<div class="msg" style="color:#ef4444">⚠ '+e.message+'</div>';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
