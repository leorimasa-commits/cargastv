<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviexport — Planilla de Cargas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#070c18;color:#e2e8f0;font-family:'Inter',sans-serif;overflow-x:hidden;}
.root{display:flex;flex-direction:column;min-height:100vh;}
.refresh-bar{height:3px;background:rgba(255,255,255,0.04);overflow:hidden;}
.refresh-fill{height:100%;background:#38bdf8;width:100%;transition:width 60s linear;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 36px;background:#0b1022;border-bottom:1px solid rgba(255,255,255,0.06);}
.header-left{display:flex;flex-direction:column;gap:3px;}
.brand{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#2a3d55;}
.day-title{font-size:24px;font-weight:700;color:#e2e8f0;text-transform:capitalize;}
.stats{display:flex;align-items:center;gap:22px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat .lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#2a3d55;margin-bottom:2px;}
.stat .val{font-size:20px;font-weight:700;font-family:'Roboto Mono',monospace;}
.val.blue{color:#38bdf8;} .val.green{color:#4ade80;} .val.amber{color:#fb923c;}
.sep{width:1px;height:36px;background:rgba(255,255,255,0.07);}
.clock-wrap{display:flex;flex-direction:column;align-items:flex-end;}
.clock{font-size:26px;font-weight:900;font-family:'Roboto Mono',monospace;color:#38bdf8;letter-spacing:.04em;}
.live-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
.live-lbl{font-size:9px;letter-spacing:.15em;color:#2a3d55;text-transform:uppercase;}
.day-nav{display:flex;gap:2px;padding:0 36px;background:#0b1022;border-bottom:1px solid rgba(255,255,255,0.04);overflow-x:auto;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.day-btn{padding:10px 16px;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:#2a3d55;transition:all .2s;white-space:nowrap;text-transform:capitalize;}
.day-btn:hover{color:#7aa0c0;}
.day-btn.active{color:#38bdf8;border-bottom-color:#38bdf8;}
.auto-bar{height:2px;background:rgba(255,255,255,0.03);margin:0;}
.auto-fill{height:100%;background:rgba(56,189,248,.35);width:100%;transition:width 25s linear;}
.content{flex:1;padding:20px 36px;}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-left:3px solid #ef4444;border-radius:6px;padding:12px 16px;font-size:13px;color:#fca5a5;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.card{background:#0f1628;border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:14px 16px;transition:border-color .3s;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card:hover{border-color:rgba(56,189,248,.25);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.client{font-size:14px;font-weight:700;color:#c8d8ee;}
.qty{font-size:11px;font-family:'Roboto Mono',monospace;background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.18);padding:2px 8px;border-radius:4px;}
.permiso{font-size:10px;font-family:'Roboto Mono',monospace;color:#1e3050;margin-bottom:9px;letter-spacing:.04em;word-break:break-all;}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;}
.tag-dest{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.15);}
.tag-ref{background:rgba(251,146,60,.08);color:#fb923c;border:1px solid rgba(251,146,60,.15);}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);font-size:11px;color:#2a3d55;}
.hab{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;}
.hab.si{background:rgba(74,222,128,.12);color:#4ade80;}
.hab.no{background:rgba(42,61,85,.25);color:#2a3d55;}
.ticker{background:#0b1022;border-top:1px solid rgba(255,255,255,0.04);padding:9px 0;overflow:hidden;}
.ticker-track{display:flex;gap:40px;animation:scroll 35s linear infinite;width:max-content;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.tick-item{font-size:11px;color:#2a3d55;white-space:nowrap;padding-left:20px;}
.tick-item strong{color:#4a7090;font-weight:500;margin-right:4px;}
.empty{color:#2a3d55;font-size:14px;padding:60px;text-align:center;}
.loading{color:#334466;font-size:14px;padding:60px;text-align:center;animation:pulse 1.2s ease-in-out infinite alternate;}
@keyframes pulse{from{opacity:.3;}to{opacity:.9;}}
</style>
</head>
<body>
<div class="root">
  <div class="refresh-bar"><div class="refresh-fill" id="rbar"></div></div>
  <div class="header">
    <div class="header-left">
      <div class="brand">Serviexport — Planilla de Cargas</div>
      <div class="day-title" id="day-label">Cargando...</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="lbl">Cargas</span><span class="val blue" id="s-cargas">—</span></div>
      <div class="sep"></div>
      <div class="stat"><span class="lbl">Contenedores</span><span class="val green" id="s-cnts">—</span></div>
      <div class="sep"></div>
      <div class="stat"><span class="lbl">Habilitados</span><span class="val amber" id="s-hab">—</span></div>
      <div class="sep"></div>
      <div class="clock-wrap">
        <div class="clock" id="clock">--:--:--</div>
        <div class="live-row"><span class="dot"></span><span class="live-lbl" id="last-update">conectando...</span></div>
      </div>
    </div>
  </div>
  <div class="day-nav" id="day-nav"></div>
  <div class="auto-bar"><div class="auto-fill" id="abar"></div></div>
  <div class="content">
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="grid" class="grid"><div class="loading">Leyendo planilla desde Google Sheets...</div></div>
  </div>
  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>
</div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSboYd84ArnGhLxO1XMQalDF5T3NbkngcQFD4cNe-spfV9G-qJ5dOXp28t2ivVcgttsJOarnRnxmg5U/pub?gid=0&single=true&output=csv';
const CSV_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(SHEET_CSV);
const REFRESH_MS = 60000;
const AUTO_DAY_MS = 25000;

let allDays = {}, currentDay = null, autoIdx = 0, autoTimer = null;

// Reloj
function tick() {
  const n = new Date(), p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
}
setInterval(tick, 1000); tick();

// CSV parser
function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = []; let inQ = false, cur = '';
    for (const c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// Normalizar fecha a YYYY-MM-DD
function normDate(raw) {
  if (!raw) return null;
  const s = raw.replace(/"/g,'').trim().toLowerCase();
  const mo = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  let m;
  m = s.match(/\w+,?\s+(\d+)\s+de\s+(\w+)/);
  if (m && mo[m[2]]) return `2026-${String(mo[m[2]]).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = s.match(/(\d+)\/(\d+)\/(\d+)/);
  if (m) { const [,d,mon,y]=m; return `${y.length===4?y:'20'+y}-${mon.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  m = s.match(/(\w+)\s+(\d+)\s+de\s+(\w+)/);
  if (m && mo[m[3]]) return `2026-${String(mo[m[3]]).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return null;
}

function friendlyDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const dt = new Date(+y,+m-1,+d);
  const wd = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const mn = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${wd[dt.getDay()]} ${+d} de ${mn[+m-1]}`;
}

function todayISO() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function parseCargas(rows) {
  const days = {};
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 7) continue;
    const g = j => (r[j]||'').replace(/"/g,'').trim();
    const hab = g(0), guarda = g(1), rawDate = g(4), permiso = g(5),
          client = g(6), qty = parseInt(g(7))||1, ref = g(8), dest = g(9);
    if (!client || !rawDate) continue;
    const iso = normDate(rawDate);
    if (!iso) continue;
    if (!days[iso]) days[iso] = [];
    days[iso].push({ hab, guarda, permiso, client, qty, ref, dest });
  }
  return days;
}

function renderNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  Object.keys(allDays).sort().forEach(iso => {
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (iso === currentDay ? ' active' : '');
    btn.textContent = friendlyDate(iso);
    btn.onclick = () => { currentDay = iso; renderGrid(); resetAuto(); };
    nav.appendChild(btn);
  });
  // scroll al tab activo
  const active = nav.querySelector('.active');
  if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

function renderGrid() {
  const items = allDays[currentDay] || [];
  const grid = document.getElementById('grid');
  document.getElementById('day-label').textContent = friendlyDate(currentDay) || '—';
  document.getElementById('s-cargas').textContent = items.length || '0';
  document.getElementById('s-cnts').textContent = items.reduce((s,x)=>s+(x.qty||1),0) || '0';
  document.getElementById('s-hab').textContent = items.filter(x=>x.hab&&x.hab.toUpperCase().includes('SI')).length || '0';

  if (!items.length) {
    grid.innerHTML = '<div class="empty">Sin cargas para este día</div>';
    renderTicker([]); renderNav(); return;
  }
  grid.innerHTML = '';
  items.forEach(item => {
    const isHab = item.hab && item.hab.toUpperCase().includes('SI');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <span class="client">${item.client}</span>
        <span class="qty">${item.qty} cnt</span>
      </div>
      <div class="permiso">${item.permiso||'—'}</div>
      <div class="tags">
        ${item.dest?`<span class="tag tag-dest">${item.dest}</span>`:''}
        ${item.ref?`<span class="tag tag-ref">${item.ref}</span>`:''}
      </div>
      <div class="card-foot">
        <span>${item.guarda?'👤 '+item.guarda:''}</span>
        <span class="hab ${isHab?'si':'no'}">${isHab?'HAB':'—'}</span>
      </div>`;
    grid.appendChild(card);
  });
  renderTicker(items);
  renderNav();
}

function renderTicker(items) {
  const t = {};
  items.forEach(x => { t[x.client]=(t[x.client]||0)+(x.qty||1); });
  const html = Object.entries(t).map(([c,q])=>`<span class="tick-item"><strong>${c}</strong>${q} cont.</span>`).join('');
  document.getElementById('ticker').innerHTML = html+html;
}

function startAutoBar() {
  const b = document.getElementById('abar');
  b.style.transition = 'none'; b.style.width = '100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    b.style.transition = `width ${AUTO_DAY_MS}ms linear`; b.style.width = '0%';
  }));
}

function resetAuto() {
  clearInterval(autoTimer); startAutoBar();
  autoTimer = setInterval(()=>{
    const sorted = Object.keys(allDays).sort();
    if (!sorted.length) return;
    autoIdx = (autoIdx+1) % sorted.length;
    currentDay = sorted[autoIdx];
    renderGrid(); startAutoBar();
  }, AUTO_DAY_MS);
}

function startRefreshBar() {
  const b = document.getElementById('rbar');
  b.style.transition = 'none'; b.style.width = '100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    b.style.transition = `width ${REFRESH_MS}ms linear`; b.style.width = '0%';
  }));
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    const parsed = parseCargas(rows);
    if (!Object.keys(parsed).length) throw new Error('Sin datos');

    const firstLoad = !Object.keys(allDays).length;
    allDays = parsed;

    if (firstLoad) {
      const sorted = Object.keys(allDays).sort();
      const today = todayISO();
      currentDay = allDays[today] ? today : sorted[sorted.length-1];
      autoIdx = sorted.indexOf(currentDay);
      resetAuto();
    }

    renderGrid();
    startRefreshBar();
    document.getElementById('error-box').style.display = 'none';
    const n = new Date(), p = x=>String(x).padStart(2,'0');
    document.getElementById('last-update').textContent = `act. ${p(n.getHours())}:${p(n.getMinutes())}`;
  } catch(e) {
    const box = document.getElementById('error-box');
    box.style.display = ''; box.textContent = '⚠ No se pudo leer la planilla: '+e.message;
  }
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
