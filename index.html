<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviexport — Planilla de Cargas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#070c18;color:#e2e8f0;font-family:'Inter',sans-serif;overflow-x:hidden;}

.root{display:flex;flex-direction:column;min-height:100vh;}

/* REFRESH BAR */
.refresh-bar{height:3px;background:rgba(255,255,255,0.04);position:relative;overflow:hidden;}
.refresh-fill{height:100%;background:#38bdf8;width:100%;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;background:#0b1022;border-bottom:1px solid rgba(255,255,255,0.06);}
.header-left{display:flex;flex-direction:column;gap:3px;}
.brand{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#2a3d55;}
.day-title{font-size:24px;font-weight:700;color:#e2e8f0;text-transform:capitalize;}

.stats{display:flex;align-items:center;gap:24px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat .lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#2a3d55;margin-bottom:2px;}
.stat .val{font-size:20px;font-weight:700;font-family:'Roboto Mono',monospace;}
.val.blue{color:#38bdf8;}
.val.green{color:#4ade80;}
.val.amber{color:#fb923c;}
.sep{width:1px;height:36px;background:rgba(255,255,255,0.07);}

.clock-wrap{display:flex;flex-direction:column;align-items:flex-end;}
.clock{font-size:26px;font-weight:900;font-family:'Roboto Mono',monospace;color:#38bdf8;letter-spacing:.04em;}
.live-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
.live-lbl{font-size:9px;letter-spacing:.15em;color:#2a3d55;text-transform:uppercase;}

/* NAV */
.day-nav{display:flex;gap:2px;padding:0 36px;background:#0b1022;border-bottom:1px solid rgba(255,255,255,0.04);overflow-x:auto;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.day-btn{padding:10px 16px;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:#2a3d55;transition:all .2s;white-space:nowrap;text-transform:capitalize;}
.day-btn:hover{color:#7aa0c0;}
.day-btn.active{color:#38bdf8;border-bottom-color:#38bdf8;}

/* CONTENT */
.content{flex:1;padding:20px 36px;overflow:auto;}

.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-left:3px solid #ef4444;border-radius:6px;padding:12px 16px;font-size:13px;color:#fca5a5;margin-bottom:14px;}
.nota-box{background:rgba(251,146,60,.05);border:1px solid rgba(251,146,60,.12);border-left:3px solid #fb923c;border-radius:6px;padding:10px 16px;font-size:12px;color:#fdba74;margin-bottom:14px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

.card{background:#0f1628;border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:14px 16px;transition:border-color .3s,transform .2s;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card:hover{border-color:rgba(56,189,248,.25);transform:translateY(-1px);}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.client{font-size:14px;font-weight:700;color:#c8d8ee;}
.qty{font-size:11px;font-family:'Roboto Mono',monospace;background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.18);padding:2px 8px;border-radius:4px;}
.permiso{font-size:10px;font-family:'Roboto Mono',monospace;color:#1e3050;margin-bottom:9px;letter-spacing:.04em;word-break:break-all;}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;}
.tag-dest{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.15);}
.tag-ref{background:rgba(251,146,60,.08);color:#fb923c;border:1px solid rgba(251,146,60,.15);}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);font-size:11px;color:#2a3d55;}
.hab{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;}
.hab.si{background:rgba(74,222,128,.12);color:#4ade80;}
.hab.no{background:rgba(42,61,85,.25);color:#2a3d55;}

/* TICKER */
.ticker{background:#0b1022;border-top:1px solid rgba(255,255,255,0.04);padding:9px 0;overflow:hidden;}
.ticker-track{display:flex;gap:40px;animation:scroll 35s linear infinite;width:max-content;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.tick-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#2a3d55;white-space:nowrap;padding-left:20px;}
.tick-item strong{color:#4a7090;font-weight:500;}

/* STATES */
.empty{color:#2a3d55;font-size:14px;padding:60px;text-align:center;}
.loading{color:#2a3d55;font-size:14px;padding:60px;text-align:center;animation:fadePulse 1.2s ease-in-out infinite alternate;}
@keyframes fadePulse{from{opacity:.3;}to{opacity:.9;}}

/* AUTO PROGRESS */
.auto-bar{height:2px;background:rgba(255,255,255,0.04);margin:0 36px 0;border-radius:1px;overflow:hidden;}
.auto-fill{height:100%;background:rgba(56,189,248,.3);width:100%;}
</style>
</head>
<body>
<div class="root" id="app">
  <div class="refresh-bar"><div class="refresh-fill" id="rbar"></div></div>

  <div class="header">
    <div class="header-left">
      <div class="brand">Serviexport — Planilla de Cargas</div>
      <div class="day-title" id="day-label">Cargando...</div>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="lbl">Cargas</span>
        <span class="val blue" id="s-cargas">—</span>
      </div>
      <div class="sep"></div>
      <div class="stat">
        <span class="lbl">Contenedores</span>
        <span class="val green" id="s-cnts">—</span>
      </div>
      <div class="sep"></div>
      <div class="stat">
        <span class="lbl">Habilitados</span>
        <span class="val amber" id="s-hab">—</span>
      </div>
      <div class="sep"></div>
      <div class="clock-wrap">
        <div class="clock" id="clock">--:--:--</div>
        <div class="live-row">
          <span class="dot"></span>
          <span class="live-lbl" id="last-update">actualizando...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="day-nav" id="day-nav"></div>
  <div class="auto-bar"><div class="auto-fill" id="abar"></div></div>

  <div class="content">
    <div id="nota-box" class="nota-box" style="display:none"></div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="grid" class="grid">
      <div class="loading">Leyendo planilla desde Google Sheets...</div>
    </div>
  </div>

  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>
</div>

<script>
const SHEET_ID = '1YIhaJwYMk90n3qgBadxQbeBkrTQTHb6LJI5t0J1rrww';
const REFRESH_INTERVAL = 60000;  // actualizar sheet cada 60s
const AUTO_DAY_INTERVAL = 25000; // rotar entre días cada 25s

let allDays = {};
let currentDay = null;
let autoIdx = 0;
let autoTimer = null;
let refreshTimer = null;
let autoBarTimer = null;

// ── Reloj ─────────────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
}
setInterval(tick, 1000); tick();

// ── CSV fetch ─────────────────────────────────────────────────────────────────
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return parseCSV(await res.text());
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = [];
    let inQ = false, cur = '';
    for (const c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// ── Parseo de fechas ──────────────────────────────────────────────────────────
function normalizeDate(raw) {
  if (!raw) return null;
  const s = raw.replace(/"/g,'').trim().toLowerCase();
  const mo = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  let m;
  m = s.match(/\w+,?\s+(\d+)\s+de\s+(\w+)/);
  if (m && mo[m[2]]) return `2026-${String(mo[m[2]]).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = s.match(/(\d+)\/(\d+)\/(\d+)/);
  if (m) { const [,d,mon,y]=m; return `${y.length===4?y:'20'+y}-${mon.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  m = s.match(/(\w+)\s+(\d+)\s+de\s+(\w+)/);
  if (m && mo[m[3]]) return `2026-${String(mo[m[3]]).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return null;
}

function friendlyDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const dt = new Date(+y,+m-1,+d);
  const wd = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const mn = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${wd[dt.getDay()]} ${+d} de ${mn[+m-1]}`;
}

function todayISO() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

// ── Parseo de la hoja Cargas ──────────────────────────────────────────────────
function parseCargas(rows) {
  const days = {};
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 7) continue;
    const get = j => (r[j]||'').replace(/"/g,'').trim();
    const hab     = get(0);
    const guarda  = get(1);
    const rawDate = get(4);
    const permiso = get(5);
    const client  = get(6);
    const qty     = parseInt(get(7)) || 1;
    const ref     = get(8);
    const dest    = get(9);
    if (!client || !rawDate) continue;
    const iso = normalizeDate(rawDate);
    if (!iso) continue;
    if (!days[iso]) days[iso] = [];
    days[iso].push({ hab, guarda, permiso, client, qty, ref, dest });
  }
  return days;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  Object.keys(allDays).sort().forEach(iso => {
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (iso === currentDay ? ' active' : '');
    btn.textContent = friendlyDate(iso);
    btn.onclick = () => { currentDay = iso; renderGrid(); resetAutoRotate(); };
    nav.appendChild(btn);
  });
}

function renderGrid() {
  const items = allDays[currentDay] || [];
  const grid  = document.getElementById('grid');
  const nota  = document.getElementById('nota-box');
  nota.style.display = 'none';

  document.getElementById('day-label').textContent = friendlyDate(currentDay) || '—';
  document.getElementById('s-cargas').textContent  = items.length || '0';
  document.getElementById('s-cnts').textContent    = items.reduce((s,x)=>s+(x.qty||1),0) || '0';
  document.getElementById('s-hab').textContent     = items.filter(x=>x.hab&&x.hab.toUpperCase().includes('SI')).length || '0';

  if (!items.length) {
    grid.innerHTML = '<div class="empty">Sin cargas para este día</div>';
    renderTicker([]);
    renderNav();
    return;
  }

  grid.innerHTML = '';
  items.forEach(item => {
    const isHab = item.hab && item.hab.toUpperCase().includes('SI');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <span class="client">${item.client}</span>
        <span class="qty">${item.qty} cnt</span>
      </div>
      <div class="permiso">${item.permiso||'—'}</div>
      <div class="tags">
        ${item.dest ? `<span class="tag tag-dest">${item.dest}</span>` : ''}
        ${item.ref  ? `<span class="tag tag-ref">${item.ref}</span>`  : ''}
      </div>
      <div class="card-foot">
        <span>${item.guarda ? '👤 '+item.guarda : ''}</span>
        <span class="hab ${isHab?'si':'no'}">${isHab?'HAB':'—'}</span>
      </div>`;
    grid.appendChild(card);
  });

  renderTicker(items);
  renderNav();
}

function renderTicker(items) {
  const totals = {};
  items.forEach(x => { totals[x.client] = (totals[x.client]||0) + (x.qty||1); });
  const html = Object.entries(totals)
    .map(([c,q]) => `<span class="tick-item"><strong>${c}</strong>${q} cont.</span>`)
    .join('');
  document.getElementById('ticker').innerHTML = html + html; // doble para loop continuo
}

// ── Barra de progreso de rotación automática ──────────────────────────────────
function startAutoBar() {
  const bar = document.getElementById('abar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${AUTO_DAY_INTERVAL}ms linear`;
      bar.style.width = '0%';
    });
  });
}

function resetAutoRotate() {
  clearInterval(autoTimer);
  startAutoBar();
  autoTimer = setInterval(() => {
    const sorted = Object.keys(allDays).sort();
    if (!sorted.length) return;
    autoIdx = (autoIdx + 1) % sorted.length;
    currentDay = sorted[autoIdx];
    renderGrid();
    startAutoBar();
  }, AUTO_DAY_INTERVAL);
}

// ── Barra de refresh ──────────────────────────────────────────────────────────
function startRefreshBar() {
  const bar = document.getElementById('rbar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${REFRESH_INTERVAL}ms linear`;
      bar.style.width = '0%';
    });
  });
}

// ── Carga principal ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const rows = await fetchSheet('Cargas');
    const parsed = parseCargas(rows);
    if (!Object.keys(parsed).length) throw new Error('Sin datos en la hoja Cargas');

    const hadData = Object.keys(allDays).length > 0;
    allDays = parsed;

    const sorted = Object.keys(allDays).sort();
    if (!hadData) {
      const today = todayISO();
      currentDay = allDays[today] ? today : sorted[sorted.length - 1];
      autoIdx = sorted.indexOf(currentDay);
    }

    renderGrid();
    startRefreshBar();
    document.getElementById('error-box').style.display = 'none';

    const now = new Date();
    const p = n => String(n).padStart(2,'0');
    document.getElementById('last-update').textContent = `act. ${p(now.getHours())}:${p(now.getMinutes())}`;
  } catch(e) {
    const box = document.getElementById('error-box');
    box.style.display = '';
    box.textContent = '⚠ No se pudo leer la planilla: ' + e.message;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
refreshTimer = setInterval(loadData, REFRESH_INTERVAL);
resetAutoRotate();
</script>
</body>
</html>
